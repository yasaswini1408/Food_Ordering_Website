<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Flavors of India</title>
  <link rel="stylesheet" href="../css/cart.css">
</head>
<body>

  <header>
    <h1>🛒 Your Cart</h1>
    <a href="../index.html" class="back-button">← Back to Menu</a>
  </header>

  <main>
    <div class="cart-container">
      <table id="cart-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="cart-body">
     
        </tbody>
      </table>

      <div class="cart-summary">
        <h2>Cart Summary</h2>
        <p><strong>Total Amount: ₹<span id="cart-total">0</span></strong></p>
        <button id="checkout-btn">Checkout</button>
      </div>
    </div>
  </main>

  <script src="../script/cartPage.js"></script>
</body>
</html>
